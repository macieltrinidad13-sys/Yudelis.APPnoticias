<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech & Science News | Portal Profesional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-dark border-bottom border-warning py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="navbar-brand mb-0 h1 text-warning fw-bold">
                <i class="fas fa-microchip me-2"></i>TECH NEWS AGGREGATOR
            </h1>
            <button id="downloadBtn" class="btn btn-warning fw-bold">
                <i class="fas fa-file-download me-2"></i>Descargar Top 10 (.txt)
            </button>
        </div>
    </nav>

    <main class="container my-5">
        <div id="newsContainer" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-warning" role="status"></div>
                <p class="mt-2">Cargando las últimas novedades...</p>
            </div>
        </div>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
